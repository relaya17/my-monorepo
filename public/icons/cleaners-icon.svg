<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Woman cleaner (right side, RTL first) -->
  <!-- Head -->
  <circle cx="20" cy="10" r="5" fill="#f9a875" stroke="#e07a45" stroke-width="1"/>
  <!-- Hair -->
  <path d="M15 8 Q17 4 20 5 Q23 4 25 8" fill="#4a2f1a" stroke="#4a2f1a" stroke-width="0.5"/>
  <!-- Body -->
  <path d="M14 25 Q16 14 20 14 Q24 14 26 25 Z" fill="#e8356d"/>
  <!-- Apron -->
  <path d="M17 17 L20 15 L23 17 L22 25 L18 25 Z" fill="white" opacity="0.8"/>
  <!-- Left arm with mop -->
  <line x1="14" y1="18" x2="8" y2="28" stroke="#f9a875" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mop stick -->
  <line x1="8" y1="28" x2="5" y2="44" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <!-- Mop head -->
  <path d="M2 44 Q5 48 8 44 Q7 41 5 41 Q3 41 2 44Z" fill="#64b5f6" opacity="0.9"/>
  <line x1="3" y1="44" x2="2" y2="47" stroke="#64b5f6" stroke-width="1.5"/>
  <line x1="5" y1="45" x2="4" y2="48" stroke="#64b5f6" stroke-width="1.5"/>
  <line x1="7" y1="44" x2="6" y2="47" stroke="#64b5f6" stroke-width="1.5"/>
  <!-- Right arm -->
  <line x1="26" y1="18" x2="30" y2="22" stroke="#f9a875" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="18" y1="25" x2="16" y2="36" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="25" x2="24" y2="36" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="15.5" cy="36.5" rx="3" ry="1.5" fill="#333"/>
  <ellipse cx="24.5" cy="36.5" rx="3" ry="1.5" fill="#333"/>

  <!-- Man cleaner (left side) -->
  <!-- Head -->
  <circle cx="44" cy="10" r="5" fill="#f9a875" stroke="#e07a45" stroke-width="1"/>
  <!-- Hair -->
  <path d="M39 8 Q41 5 44 5.5 Q47 5 49 8" fill="#2c1810" stroke="#2c1810" stroke-width="0.5"/>
  <!-- Body -->
  <path d="M38 25 Q40 14 44 14 Q48 14 50 25 Z" fill="#1976d2"/>
  <!-- Pocket/logo detail -->
  <rect x="42" y="17" width="4" height="3" rx="0.5" fill="white" opacity="0.4"/>
  <!-- Left arm -->
  <line x1="38" y1="18" x2="34" y2="22" stroke="#f9a875" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm with spray bottle -->
  <line x1="50" y1="18" x2="56" y2="26" stroke="#f9a875" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Spray bottle -->
  <rect x="54" y="24" width="5" height="8" rx="1.5" fill="#4caf50"/>
  <path d="M54 26 L51 24 L53 22 L56 24" fill="#4caf50"/>
  <!-- Spray mist -->
  <circle cx="50" cy="21" r="1" fill="#b3e5fc" opacity="0.8"/>
  <circle cx="48" cy="19" r="0.8" fill="#b3e5fc" opacity="0.6"/>
  <circle cx="51" cy="18" r="0.7" fill="#b3e5fc" opacity="0.5"/>
  <!-- Legs -->
  <line x1="42" y1="25" x2="40" y2="36" stroke="#1a237e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="25" x2="48" y2="36" stroke="#1a237e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="39.5" cy="36.5" rx="3" ry="1.5" fill="#333"/>
  <ellipse cx="48.5" cy="36.5" rx="3" ry="1.5" fill="#333"/>

  <!-- Sparkle between them -->
  <path d="M32 20 L33 24 L37 25 L33 26 L32 30 L31 26 L27 25 L31 24 Z" fill="#FFD700" opacity="0.9"/>

  <!-- Floor shine -->
  <ellipse cx="32" cy="40" rx="20" ry="2" fill="#e0f7fa" opacity="0.3"/>
</svg>
